[build]
  publish = "_site"
  command = "npm install && npm run build"

[build.environment]
  NODE_VERSION = "18"

# Pretty URL for the admin
[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

# Game (index.html) gets cached aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[backend]
  branch = "main"
  status_path = "api/auth/status"
  identity = "/.netlify/identity"
  gateway = "/.netlify/git/github"
