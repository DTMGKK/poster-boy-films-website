heading_html: "Four levels.<br><em>One story world.</em>"
overline: "HOW WE WORK"
steps:
  - level: "LEVEL 01"
    title: "Build the world first"
    desc: "Character, mythology and world logic before format. The story architecture comes before any screen decision is made."
    tag: "World Bible · Character Design · Story Engine"
  - level: "LEVEL 02"
    title: "Test with real audiences"
    desc: "Real feedback shapes development decisions before budgets are committed. We put work in front of people early and often."
    tag: "Audience Research · Prototype Testing · Early Screenings"
  - level: "LEVEL 03"
    title: "Develop formats in parallel"
    desc: "Film, animation, games and audio are developed as a system — not as afterthoughts to a primary format that got there first."
    tag: "Multi-Format Strategy · IP Architecture · Partner Development"
  - level: "LEVEL 04"
    title: "Compound the IP value"
    desc: "Each format adds value to the others. A game builds the audience for the film. The podcast extends the world. Press play is not just a button."
    tag: "✦ FINAL OBJECTIVE"
    highlight: true
